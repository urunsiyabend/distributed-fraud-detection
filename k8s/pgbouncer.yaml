apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: fraud-detection
data:
  pgbouncer.ini: |
    [databases]
    fraud = host=postgres port=5432 dbname=fraud

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    default_pool_size = 20
    max_client_conn = 1000
    min_pool_size = 5
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    server_idle_timeout = 300
    server_lifetime = 3600
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
  userlist.txt: |
    "fraud" "fraud"
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: fraud-detection
spec:
  selector:
    app: pgbouncer
  ports:
    - port: 6432
      targetPort: 6432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: fraud-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:latest
          ports:
            - containerPort: 6432
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: pgbouncer-config
          configMap:
            name: pgbouncer-config
