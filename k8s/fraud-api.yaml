apiVersion: v1
kind: Service
metadata:
  name: fraud-api
  namespace: fraud-detection
spec:
  type: LoadBalancer
  selector:
    app: fraud-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api
  namespace: fraud-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-api
  template:
    metadata:
      labels:
        app: fraud-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: fraud-api
          image: fraud-detection:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
            - containerPort: 50051
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fraud-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DSN
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?sslmode=disable"
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: fraud-config
                  key: REDIS_ADDR
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: fraud-config
                  key: NATS_URL
            - name: OTEL_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: fraud-config
                  key: OTEL_ENDPOINT
          envFrom:
            - configMapRef:
                name: fraud-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
