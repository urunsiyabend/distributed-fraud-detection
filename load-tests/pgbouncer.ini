[databases]
fraud = host=postgres port=5432 dbname=fraud

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
default_pool_size = 20
max_client_conn = 200
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

server_idle_timeout = 300
server_lifetime = 3600

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
