services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    ports:
      - "5432:5432"
    volumes:
      - ./load-tests/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 2s
      timeout: 5s
      retries: 10

  transaction-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: txn
      POSTGRES_PASSWORD: txn
      POSTGRES_DB: transactions
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txn"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports:
      - "6432:6432"
    volumes:
      - ./load-tests/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./load-tests/pgbouncer-userlist.txt:/etc/pgbouncer/userlist.txt
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U fraud"]
      interval: 2s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"

  jaeger:
    image: jaegertracing/jaeger:2.5.0
    ports:
      - "16686:16686"
      - "4317:4317"

  fraud-api:
    build:
      context: .
      dockerfile: fraud-detection/Dockerfile
    entrypoint: ["/fraud-api"]
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      POSTGRES_DSN: "postgres://fraud:fraud@pgbouncer:6432/fraud?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      NATS_URL: "nats://nats:4222"
      OTEL_ENDPOINT: "jaeger:4317"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      jaeger:
        condition: service_started

  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      POSTGRES_DSN: "postgres://txn:txn@transaction-db:5432/transactions?sslmode=disable"
      FRAUD_GRPC_ADDR: "fraud-api:50051"
      OTEL_ENDPOINT: "jaeger:4317"
    depends_on:
      transaction-db:
        condition: service_healthy
      fraud-api:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.4.1
    ports:
      - "9090:9090"
    volumes:
      - ./load-tests/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - fraud-api

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./load-tests/grafana-datasource.yml:/etc/grafana/provisioning/datasources/ds.yml
      - ./load-tests/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml
      - ./load-tests/grafana-dashboard.json:/var/lib/grafana/dashboards/fraud.json
    depends_on:
      - prometheus
